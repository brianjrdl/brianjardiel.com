    class="bg-gradient-to-br from-synth-dark to-synth-mid min-h-screen flex items-center justify-center p-md overflow-hidden font-body-md text-on-surface">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messages = [
                "Booting up core modules...",
                "Searching for high-quality coffee...",
                "Compiling projects...",
                "Defeating bugs...",
                "Establishing connection to main_v01..."
            ];

            const outputDiv = document.getElementById('terminal-output');
            const typingSpan = document.getElementById('current-typing');

            let messageIndex = 0;
            let charIndex = 0;
            let isTyping = false;
            let currentText = '';

            function typeWriter() {
                if (messageIndex >= messages.length) {
                    messageIndex = 0; // Loop or stop
                    outputDiv.innerHTML = ''; // Clear for loop
                }

                currentText = messages[messageIndex];
                isTyping = true;

                if (charIndex < currentText.length) {
                    typingSpan.textContent += currentText.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 50); // Typing speed
                } else {
                    isTyping = false;
                    setTimeout(finishLine, 1000); // Pause before moving to next line
                }
            }

            function finishLine() {
                const p = document.createElement('p');
                p.textContent = "> " + currentText;
                outputDiv.appendChild(p);

                // Keep only last 4 lines to prevent overflow
                if (outputDiv.children.length > 4) {
                    outputDiv.removeChild(outputDiv.firstChild);
                }

                typingSpan.textContent = '';
                charIndex = 0;
                messageIndex++;
                setTimeout(typeWriter, 500); // Pause before starting next line
            }

            // Start sequence
            setTimeout(typeWriter, 1000);

            // Button interaction
            const btn = document.getElementById('insert-coin-btn');
            btn.addEventListener('click', () => {
                outputDiv.innerHTML = '';
                typingSpan.textContent = '';
                charIndex = 0;
                messageIndex = 0;
                messages.push("COIN ACCEPTED. INITIATING PROTOCOL...");
                messageIndex = messages.length - 1; // Jump to new message
                typeWriter();

                // Play sound or transition here in a real app
                btn.classList.add('bg-secondary-fixed');
                setTimeout(() => btn.classList.remove('bg-secondary-fixed'), 200);
            });
        });
    </script>
